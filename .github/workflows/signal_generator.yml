name: XAUUSD Signal Generator

on:
  # ── Run at the top of every hour (24/7 coverage) ──
  schedule:
    - cron: "0 * * * *"

  # ── Allow manual trigger from GitHub UI ──
  workflow_dispatch:

jobs:
  run-signal-generator:
    name: Run Signal Generator (50 min)
    runs-on: ubuntu-latest
    timeout-minutes: 55        # GitHub hard-kill after 55 min (our script exits at 50)

    permissions:
      contents: write           # needed for git push (auto-commit performance_log.csv)

    steps:
      # ── 1. Checkout repository ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ──
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ──
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Run signal generator ──
      - name: Run signal generator (50 minutes)
        env:
          # ── All secrets injected from GitHub Secrets — never hardcode ──
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:        ${{ github.repository }}
          ACCOUNT_BALANCE:    ${{ secrets.ACCOUNT_BALANCE }}
          RISK_PERCENT:       ${{ secrets.RISK_PERCENT }}
        run: python signal_generator.py

      # ── 5. Upload performance log as artifact (backup) ──
      - name: Upload performance log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-log-${{ github.run_id }}
          path: performance_log.csv
          retention-days: 90
