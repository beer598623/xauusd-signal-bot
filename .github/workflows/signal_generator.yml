name: XAUUSD Signal Generator

on:
  schedule:
    - cron: "0 8 * * 1-5"

  workflow_dispatch:

jobs:
  run-signal-generator:
    name: Run Signal Generator (355 min)
    runs-on: ubuntu-latest
    timeout-minutes: 365

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run signal generator (355 minutes)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:        ${{ github.repository }}
          ACCOUNT_BALANCE:    ${{ secrets.ACCOUNT_BALANCE }}
          RISK_PERCENT:       ${{ secrets.RISK_PERCENT }}
        run: python signal_generator.py

      - name: Upload performance log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-log-${{ github.run_id }}
          path: performance_log.csv
          retention-days: 90
